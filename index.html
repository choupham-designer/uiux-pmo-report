<style>
:root{
  --bg:#EEEDE8;--surf:#fff;--subtle:#EEEDE8;
  --bdr:rgba(0,0,0,.08);--bdrm:rgba(0,0,0,.13);
  --t1:#181815;--t2:#62625D;--t3:#9E9E98;
  --r:12px;--rsm:8px;--rxs:6px;
  --font:'Plus Jakarta Sans',sans-serif;--mono:'JetBrains Mono',monospace;
  --pri:#000;--prih:#222;
  --acc:oklch(64.6% 0.222 41.116);
  --accbg:oklch(96% 0.04 41.116);
  --accbd:oklch(82% 0.12 41.116);
  --acctx:oklch(38% 0.18 41.116);
  --s-est-bg:#E0F2FE;--s-est-bd:#7DD3FC;--s-est-tx:#075985;--s-est-bar:#0284C7;
  --s-con-bg:#EDE9FE;--s-con-bd:#C4B5FD;--s-con-tx:#5B21B6;--s-con-bar:#7C3AED;
  --s-flo-bg:#F5F3FF;--s-flo-bd:#DDD6FE;--s-flo-tx:#6D28D9;--s-flo-bar:#8B5CF6;
  --s-pkg-bg:#EEF2FF;--s-pkg-bd:#A5B4FC;--s-pkg-tx:#3730A3;--s-pkg-bar:#4F46E5;
  --s-han-bg:#DBEAFE;--s-han-bd:#93C5FD;--s-han-tx:#1E3A8A;--s-han-bar:#2563EB;
  --s-upd-bg:#CCFBF1;--s-upd-bd:#5EEAD4;--s-upd-tx:#134E4A;--s-upd-bar:#0D9488;
  --s-tst-bg:#FFE4E6;--s-tst-bd:#FDA4AF;--s-tst-tx:#881337;--s-tst-bar:#E11D48;
  --s-pen-bg:#FEF3C7;--s-pen-bd:#FCD34D;--s-pen-tx:#92400E;--s-pen-bar:#D97706;
  --s-don-bg:#DCFCE7;--s-don-bd:#86EFAC;--s-don-tx:#166534;--s-don-bar:#16A34A;
  --s-can-bg:#FEE2E2;--s-can-bd:#FCA5A5;--s-can-tx:#991B1B;--s-can-bar:#DC2626;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--font);background:var(--bg);color:var(--t1);min-height:100vh}
#login-screen{position:fixed;inset:0;z-index:999;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:1rem}
.lcard{background:#fff;border-radius:var(--r);border:1px solid var(--bdr);padding:2rem;width:100%;max-width:560px;display:flex;flex-direction:column;gap:1.5rem}
.lbrand{display:flex;align-items:center;gap:10px}
.lmark{width:34px;height:34px;border-radius:8px;background:var(--pri);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff}
.ltitle{font-size:20px;font-weight:700;margin-top:.25rem}
.lsub{font-size:13px;color:var(--t2);margin-top:3px}
.lgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.lchip{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:12px 8px;border-radius:var(--rsm);border:1.5px solid var(--bdrm);background:var(--subtle);font-family:var(--font);cursor:pointer;transition:all .15s;text-align:center;gap:3px}
.lchip:hover{border-color:var(--accbd);background:var(--accbg)}
.lchip.on{border-color:var(--acc);background:var(--accbg)}
.lchip-nm{font-size:13px;font-weight:600;color:#000}
.lchip-role{font-size:11px;color:var(--t3)}
.lchip.on .lchip-nm{color:var(--acctx)}
.lchip.on .lchip-role{color:var(--acctx);opacity:.75}
.lbtn{background:var(--pri);color:#fff;border:none;border-radius:var(--rxs);padding:11px;font-family:var(--font);font-size:14px;font-weight:600;cursor:pointer;transition:opacity .15s}
.lbtn:disabled{opacity:.35;cursor:not-allowed}
.lbtn:not(:disabled):hover{opacity:.82}
.sync-bar{position:fixed;bottom:1rem;right:1rem;z-index:200;background:#000;color:#fff;font-size:12px;font-weight:500;padding:7px 14px;border-radius:20px;display:none;align-items:center;gap:7px;font-family:var(--font)}
.sync-dot{width:6px;height:6px;border-radius:50%;background:#4ade80;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.topnav{background:#fff;border-bottom:1px solid var(--bdr);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:100}
.brand{display:flex;align-items:center;gap:10px}
.bmark{width:30px;height:30px;border-radius:8px;background:var(--pri);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff}
.bname{font-size:13px;font-weight:700}
.bsep{color:var(--bdrm)}
.bsub{font-size:12px;color:var(--t2)}
.buser{font-size:11px;font-weight:600;color:var(--acctx);background:var(--accbg);padding:3px 10px;border-radius:20px;margin-left:4px;cursor:pointer}
.buser:hover{background:var(--accbd)}
.nav-act{display:flex;gap:8px;align-items:center}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--rxs);font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--bdrm);background:#fff;color:var(--t1);font-family:var(--font);transition:all .15s}
.btn:hover{background:var(--subtle)}
.btn-p{background:var(--pri);color:#fff;border-color:transparent}
.btn-p:hover{background:var(--prih)}
.btn-p:disabled{opacity:.55;cursor:not-allowed}
.btn svg{width:13px;height:13px;flex-shrink:0}
.panel{display:none}
.panel.on{display:block}
.shell{display:flex;align-items:flex-start;max-width:1100px;margin:0 auto;min-height:calc(100vh - 56px)}
.sidebar{width:240px;flex-shrink:0;display:flex;flex-direction:column;background:#fff;border:1px solid var(--bdr);border-radius:6px;position:sticky;top:calc(56px + 1.5rem);max-height:calc(100vh - 56px - 3rem);overflow:hidden;margin:1.5rem 0 1.5rem 1.5rem;align-self:flex-start}
.sb-meta{padding:16px 14px 12px;border-bottom:1px solid var(--bdr);display:flex;flex-direction:column;gap:8px}
.sb-list{flex:1;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:2px}
.sb-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--rxs);cursor:pointer;transition:all .15s;border:1px solid transparent;min-height:44px}
.sb-item:hover{background:var(--accbg)}
.sb-item.on{background:var(--accbg);border-color:var(--accbd)}
.sb-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sb-body{flex:1;min-width:0}
.sb-nm{font-size:12px;font-weight:600;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.35}
.sb-nm.empty{color:var(--t3);font-weight:400;font-style:italic}
.sb-m2{font-size:11px;color:var(--t3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-del{width:20px;height:20px;border:none;background:transparent;cursor:pointer;color:var(--t3);font-size:14px;border-radius:4px;flex-shrink:0;display:flex;align-items:center;justify-content:center;opacity:0;transition:all .15s}
.sb-item:hover .sb-del{opacity:1}
.sb-del:hover{background:#FEE2E2;color:#DC2626}
.sb-empty{padding:2rem 1rem;text-align:center;font-size:12px;color:var(--t3);line-height:1.6}
.pane{flex:1;padding:2rem;display:flex;flex-direction:column;min-height:calc(100vh - 56px)}
.pane-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;color:var(--t3);font-size:13px;text-align:center}
.pane-empty svg{opacity:.3}
.fld{display:flex;flex-direction:column;gap:5px}
.fld label{font-size:12px;font-weight:600;color:var(--t2)}
.fld input,.fld textarea,.fld select{font-family:var(--font);font-size:13px;padding:8px 11px;border-radius:var(--rxs);border:1px solid var(--bdrm);background:#fff;color:var(--t1);outline:none;transition:border .15s;resize:vertical}
.fld input:focus,.fld textarea:focus,.fld select:focus{border-color:var(--acc);box-shadow:0 0 0 3px oklch(64.6% 0.222 41.116 / .15)}
.fld textarea{line-height:1.55}
.fsec{display:flex;flex-direction:column;gap:12px}
.fcard{background:#fff;border-radius:var(--rsm);border:1px solid var(--bdr);padding:1rem 1.125rem;display:flex;flex-direction:column;gap:12px}
.fcard-t{font-size:14px;font-weight:700;color:#000}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.pgroup{display:flex;gap:6px}
.pbtn{flex:1;padding:7px 4px;border-radius:var(--rxs);border:none;background:var(--subtle);font-family:var(--mono);font-size:12px;font-weight:400;color:#000;cursor:pointer;text-align:center;transition:all .15s}
.pbtn:hover{background:var(--accbg);color:var(--acctx)}
.pbtn.on{background:var(--acc);color:#fff}
.milestones{display:flex;gap:6px}
.mbtn{flex:1;padding:8px 4px;border-radius:var(--rxs);border:none;background:var(--subtle);font-family:var(--mono);font-size:12px;font-weight:400;color:#000;cursor:pointer;text-align:center;transition:all .15s}
.mbtn:hover{background:var(--accbg);color:var(--acctx)}
.mbtn.on{background:var(--acc);color:#fff;font-weight:600}
.ssel{font-family:var(--font);font-size:13px;font-weight:500;padding:8px 11px;border-radius:var(--rxs);border:1px solid var(--bdrm);outline:none;cursor:pointer;width:100%;background:#fff;color:var(--t1)}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.chip{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:20px;border:none;background:var(--subtle);font-family:var(--font);font-size:12px;font-weight:400;color:#000;cursor:pointer;transition:all .15s}
.chip:hover{background:var(--accbg);color:var(--acctx)}
.chip.on{background:var(--acc);color:#fff}
.chip.on .crole{color:rgba(255,255,255,.75)}
.crole{font-size:11px;color:var(--t3)}
.effort-list{display:flex;flex-direction:column;gap:6px;padding-top:4px}
.effort-row{display:flex;align-items:center;gap:10px}
.effort-nm{font-size:12px;font-weight:600;color:var(--t1);min-width:110px}
.effort-w{display:flex;align-items:center;gap:4px}
.effort-w input{width:64px;font-family:var(--mono);font-size:13px;text-align:right;padding:5px 8px;border-radius:var(--rxs);border:1px solid var(--bdrm);background:#fff;color:var(--t1);outline:none}
.effort-w input:focus{border-color:var(--acc);box-shadow:0 0 0 2px oklch(64.6% 0.222 41.116 / .15)}
.effort-w input::-webkit-inner-spin-button,.effort-w input::-webkit-outer-spin-button{-webkit-appearance:none}
.effort-u{font-size:12px;font-weight:600;color:var(--t2)}
.sub-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:12px;border-radius:var(--rxs);border:none;background:var(--pri);color:#fff;font-family:var(--font);font-size:14px;font-weight:600;cursor:pointer;transition:opacity .15s;margin-top:4px}
.sub-btn:hover{opacity:.85}
.sub-hint{font-size:12px;color:var(--t3);text-align:center;margin-top:6px;min-height:18px}
.pad{height:2rem}
.rwrap{max-width:800px;margin:0 auto;padding:2rem 1.5rem 5rem}
#rpt-print{background:var(--bg);border-radius:var(--r);padding:2rem 2rem 1.5rem}
.rh{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1.75rem;padding-bottom:1.25rem;border-bottom:1px solid var(--bdr)}
.rh-kick{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--t3);margin-bottom:5px}
.rh-title{font-size:24px;font-weight:700;line-height:1.15}
.rh-sub{font-size:13px;color:var(--t2);margin-top:4px}
.rh-r{text-align:right}
.rh-wk{font-family:var(--mono);font-size:13px;font-weight:500}
.rh-by{font-size:12px;color:var(--t2);margin-top:3px}
.metrics{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:1.5rem}
@media(max-width:640px){.metrics{grid-template-columns:repeat(2,minmax(0,1fr))}}
.mc{background:#fff;border:1px solid var(--bdr);border-radius:var(--rsm);padding:14px 16px}
.mc-l{font-size:11px;font-weight:700;color:var(--t2);letter-spacing:.04em;text-transform:uppercase;margin-bottom:6px}
.mc-v{font-size:28px;font-weight:700;line-height:1}
.mc-s{font-size:11px;color:var(--t3);margin-top:5px}
.sec-h{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--t3);margin:1.25rem 0 10px;display:flex;align-items:center;gap:8px}
.sec-h::after{content:'';flex:1;height:1px;background:var(--bdr)}
.cblock{background:#fff;border:1px solid var(--bdr);border-radius:var(--rsm);padding:1rem 1.25rem}
.cbar-row{display:flex;align-items:center;gap:10px;padding:5px 0}
.cbar-n{font-size:12px;color:var(--t2);flex:0 0 38%;min-width:80px;max-width:200px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cbar-t{flex:1;height:7px;background:rgba(0,0,0,.07);border-radius:4px;overflow:hidden}
.cbar-f{height:100%;border-radius:4px;transition:width .5s}
.cbar-p{font-family:var(--mono);font-size:11px;font-weight:500;min-width:34px;text-align:right}
.cleg{display:flex;gap:12px;flex-wrap:wrap;margin-top:12px;padding-top:10px;border-top:1px solid var(--bdr)}
.leg-i{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--t2)}
.leg-d{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(100%,280px),1fr));gap:12px}
.rcard{background:#fff;border-radius:var(--rsm);padding:1rem;display:flex;flex-direction:column;gap:9px;border:1px solid var(--bdr)}
.rcard.risky{border-color:rgba(220,38,38,.25)}
.rcard-top{display:flex;justify-content:space-between;align-items:flex-start;gap:6px}
.rcard-nm{font-size:13px;font-weight:700;flex:1;line-height:1.35}
.spill{font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;white-space:nowrap;flex-shrink:0;letter-spacing:.02em}
.pm-m{display:flex;justify-content:space-between;font-size:11px;color:var(--t2);margin-bottom:4px}
.pm-t{height:4px;background:rgba(0,0,0,.08);border-radius:2px;overflow:hidden}
.pm-f{height:100%;border-radius:2px}
.pm-dots{display:flex;gap:3px;margin-top:5px}
.msdot{width:8px;height:8px;border-radius:50%;background:rgba(0,0,0,.1)}
.msdot.hit{background:var(--dc,#D97706)}
.cdiv{border:none;border-top:1px solid var(--bdr)}
.crow{display:flex;gap:7px;align-items:flex-start}
.crow-ic{font-size:12px;color:var(--t3);flex-shrink:0;line-height:1.6}
.crow-l{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.05em}
.crow-tx{font-size:12px;color:var(--t1);line-height:1.55;margin-top:1px}
.nbox{background:#FFFBEB;border:1px solid #FDE68A;border-radius:var(--rxs);padding:8px 10px;font-size:12px;color:#92400E;line-height:1.55}
.nbox-l{font-size:10px;font-weight:700;color:#B45309;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.cres{margin-top:auto;padding-top:6px;border-top:1px solid var(--bdr)}
.mpills{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
.mpill{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;background:#fff;border:1px solid var(--bdrm);color:var(--t1)}
.mpill-p{font-family:var(--mono);font-size:10px;color:var(--t2)}
.pend-list{display:flex;flex-direction:column;gap:8px}
.pend-row{display:flex;gap:14px;align-items:flex-start;background:#fff;border-radius:var(--rsm);padding:10px 14px;border-left:3px solid var(--s-pen-bar)}
.done-row{display:flex;gap:14px;align-items:flex-start;background:#fff;border-radius:var(--rsm);padding:10px 14px;border-left:3px solid var(--s-don-bar)}
.pend-nm{font-size:13px;font-weight:700;flex:0 0 auto;min-width:100px;max-width:180px}
.pend-nt{font-size:12px;color:var(--t2);line-height:1.55}
.rfoot{display:flex;justify-content:space-between;align-items:center;margin-top:1.5rem;padding-top:1rem;border-top:1px solid var(--bdr);font-size:11px;color:var(--t3)}
.rfoot-r{font-family:var(--mono)}
.empty-msg{text-align:center;padding:3rem 1rem;font-size:13px;color:var(--t3)}
@media(max-width:600px){.topnav{padding:0 1rem}.bsep,.bsub{display:none}.btn:not(.btn-p){display:none}}
@media(max-width:640px){.shell{flex-direction:column}.sidebar{width:100%;position:static;margin:0;border-radius:0;max-height:none}.sb-list{flex-direction:row;flex-wrap:nowrap;overflow-x:auto;overflow-y:hidden}.sb-item{flex-shrink:0;min-width:140px;max-width:180px}.sb-del{opacity:1}.pane{padding:1.25rem;min-height:auto}.lgrid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:480px){.frow{grid-template-columns:1fr}.pgroup{flex-wrap:wrap}.pbtn{flex:0 0 calc(33.33% - 5px)}.pgrid{grid-template-columns:1fr}.rh{flex-direction:column;gap:8px}.rh-r{text-align:left}}
@media(min-width:561px) and (max-width:800px){.pgrid{grid-template-columns:repeat(2,minmax(0,1fr))}}
@media(max-width:600px){.rwrap{padding:1rem 1rem 4rem}#rpt-print{padding:1rem}}
</style>
</head>
<body>

<div id="login-screen">
  <div class="lcard">
    <div>
      <div class="lbrand"><div class="lmark">U</div><span style="font-size:14px;font-weight:700">UIUX PMO</span></div>
      <div class="ltitle">Chào mừng!</div>
      <div class="lsub">Chọn tên của bạn để bắt đầu nhập báo cáo</div>
    </div>
    <div class="lgrid" id="login-grid"></div>
    <button class="lbtn" id="login-btn" disabled onclick="doLogin()">Vào báo cáo →</button>
  </div>
</div>

<div class="sync-bar" id="sync-bar"><span class="sync-dot"></span><span id="sync-lbl">Đang đồng bộ...</span></div>

<nav class="topnav" id="topnav">
  <div class="brand">
    <div class="bmark">U</div>
    <span class="bname">UIUX PMO</span>
    <span class="bsep">·</span>
    <span class="bsub">Weekly Report</span>
    <span class="buser" id="brand-user" onclick="logoutUser()" title="Đăng xuất"></span>
  </div>
  <div class="nav-act">
    <button class="btn btn-p" id="nav-to-input" onclick="switchTab('input')" style="display:none">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="2" y="2" width="9" height="9" rx="1.5"/><path d="M5 6.5h3M6.5 5v3"/></svg>
      Lập báo cáo
    </button>
    <button class="btn" id="nav-to-report" onclick="switchTab('report')" style="display:none">Xem báo cáo →</button>
    <button class="btn btn-p" id="exp-btn" onclick="doExport()" style="display:none">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 2v8M5 7l3 3 3-3M2 12v1a1 1 0 001 1h10a1 1 0 001-1v-1"/></svg>
      Xuất PNG
    </button>
  </div>
</nav>

<div class="panel" id="panel-input">
  <div class="shell">
    <aside class="sidebar">
      <div class="sb-meta">
        <div class="fld"><label>Tuần</label><input id="m-week" type="text" oninput="onWeekChange()"></div>
        <input type="hidden" id="m-reporter" value="ChauPV">
        <input type="hidden" id="m-team" value="UIUX PMO">
        <button class="btn btn-p" style="width:100%;justify-content:center;gap:7px" onclick="addProject()">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M6 2v8M2 6h8"/></svg>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
// ── CONSTANTS ──────────────────────────────────
var MILESTONES = [0,25,50,75,100];
var PHASES = [1,2,3,4,5];
var STATUSES = [

  {val:'completed',lbl:'Completed',      bg:'var(--s-don-bg)',bd:'var(--s-don-bd)',tx:'var(--s-don-tx)',bar:'var(--s-don-bar)'},
  {val:'cancel',   lbl:'Cancel',         bg:'var(--s-can-bg)',bd:'var(--s-can-bd)',tx:'var(--s-can-tx)',bar:'var(--s-can-bar)'}
];
var ALL_MEMBERS = [
  {name:'PhanVB',    role:'Manager'  },
  {name:'HoangCD',   role:'UI Leader'},
  {name:'DucNM135',  role:'Senior UX'},
  {name:'AnhBTP7',   role:'UXW'      },

  {name:'ChauPV',    role:'Senior'   },
  {name:'PhuongLT49',role:'Senior'   },
  {name:'MinhLT33',  role:'Mid'      },
  {name:'HuongDM6',  role:'Mid'      },
  {name:'HuongPT53', role:'Junior'   },
  {name:'HuongLT55', role:'Junior'   },
  {name:'NgaLT27',   role:'Junior'   }
];
var PIC_LIST = [
  {name:'HoangCD',   role:'UI Leader'},
  {name:'DucNM135',  role:'Senior UX'},
  {name:'GiangNTT48',role:'Graphic'  },
  {name:'AnhBTP7',   role:'UXW'      },
  {name:'ChauPV',    role:'Senior'   },
  {name:'PhuongLT49',role:'Senior'   }
];

function SC(v){ for(var i=0;i<STATUSES.length;i++){ if(STATUSES[i].val===v) return STATUSES[i]; } return STATUSES[0]; }
function SL(v){ return SC(v).lbl; }
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function gv(id){ var el=document.getElementById(id); return el?el.value:''; }

// ── STATE ──────────────────────────────────────
var projects=[], _pid=0, _rt=null, _saveTimer=null;
var selectedId=null, currentUser=null;
var _fbRef=null, _initialLoaded=false;

// ── LOGIN ──────────────────────────────────────
function initLogin(){
  var grid=document.getElementById('login-grid');
  var btn=document.getElementById('login-btn');
  var picked=null;
  var saved=sessionStorage.getItem('pmo_user');
  if(saved){ currentUser=saved; afterLogin(); return; }
  var html='';
  for(var i=0;i<ALL_MEMBERS.length;i++){
    var m=ALL_MEMBERS[i];
    html+='<div class="lchip" onclick="pickLogin(this,\''+m.name+'\')">'
        +'<span class="lchip-nm">'+esc(m.name)+'</span>'
        +'<span class="lchip-role">'+esc(m.role)+'</span>'
        +'</div>';
  }
  grid.innerHTML=html;
  window.pickLogin=function(el,name){
    var chips=grid.querySelectorAll('.lchip');
    for(var i=0;i<chips.length;i++) chips[i].classList.remove('on');
    el.classList.add('on'); picked=name; btn.disabled=false;
  };
  window.doLogin=function(){
    if(!picked) return;
    currentUser=picked;
    sessionStorage.setItem('pmo_user',currentUser);
    afterLogin();
  };
}

function afterLogin(){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('m-reporter').value=currentUser;
  document.getElementById('brand-user').textContent=currentUser+' ↩';
  switchTab('report');
  initWeek();
  loadFromFirebase();
}
function logoutUser(){ sessionStorage.removeItem('pmo_user'); location.reload(); }

// ── WEEK ───────────────────────────────────────
function getISOWeek(d){
  var t=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
  t.setUTCDate(t.getUTCDate()+4-(t.getUTCDay()||7));
  var y=new Date(Date.UTC(t.getUTCFullYear(),0,1));
  return Math.ceil((((t-y)/86400000)+1)/7);
}
function initWeek(){ document.getElementById('m-week').value=getISOWeek(new Date()); }
function weekKey(){ return 'week_'+(gv('m-week')||getISOWeek(new Date())); }
function onWeekChange(){
  schedRender();
  if(_fbRef){ _fbRef.off('value',onFbValue); _fbRef=null; }
  _initialLoaded=false; projects=[]; _pid=0; selectedId=null;
  renderSidebar(); renderForm(); loadFromFirebase();
}

// ── FIREBASE ───────────────────────────────────
function normM(m){
  if(!m) return [];
  if(Array.isArray(m)) return m.filter(function(x){return x&&x.name;});
  return Object.values(m).filter(function(x){return x&&x.name;});
}
function parseRemote(data){
  if(!data||typeof data!=='object') return [];
  var arr=[];
  Object.keys(data).forEach(function(k){
    var v=data[k];
    arr.push({name:v.name||'',status:v.status||'concept',phase:v.phase||'1',
      pic:v.pic||'',lastWeek:v.lastWeek||'',nextWeek:v.nextWeek||'',
      note:v.note||'',progress:v.progress||0,members:normM(v.members),
      updatedBy:v.updatedBy||'',updatedAt:v.updatedAt||0,_order:v._order||0,fbKey:k});
  });
  arr.sort(function(a,b){return a._order-b._order;});
  return arr;
}

function loadFromFirebase(){
  showSync('Đang tải...');
  if(_fbRef) _fbRef.off('value',onFbValue);
  _fbRef=db.ref('reports/'+weekKey());
  _initialLoaded=false;
  _fbRef.once('value').then(function(snap){
    var remote=parseRemote(snap.val());
    projects=[]; _pid=0;
    remote.forEach(function(p){ var id=++_pid; var np={}; Object.assign(np,p,{id:id}); projects.push(np); });
    var found=false; for(var i=0;i<projects.length;i++){ if(projects[i].id===selectedId){found=true;break;} }
    if(!found) selectedId=projects.length?projects[0].id:null;
    renderSidebar(); renderForm(); doRender(); hideSync();
    _initialLoaded=true;
    _fbRef.on('value',onFbValue);
  }).catch(function(err){ showSync('Lỗi: '+err.message,3000); });
}

function onFbValue(snap){
  if(!_initialLoaded) return;
  var remote=parseRemote(snap.val());
  remote.forEach(function(rp){
    var lp=null; for(var i=0;i<projects.length;i++){ if(projects[i].fbKey===rp.fbKey){lp=projects[i];break;} }
    if(lp&&lp.id!==selectedId){ Object.assign(lp,rp,{id:lp.id}); }
    else if(!lp){ var id=++_pid; var np={}; Object.assign(np,rp,{id:id}); projects.push(np); }
  });
  var rkeys={}; remote.forEach(function(p){rkeys[p.fbKey]=true;});
  projects=projects.filter(function(p){return !p.fbKey||rkeys[p.fbKey]||p.id===selectedId;});
  renderSidebar(); doRender();
}

// ── FIX: saveToFirebase dùng _fbRef hiện tại, không cần kiểm tra null ──
function saveToFirebase(){
  clearTimeout(_saveTimer);
  _saveTimer=setTimeout(function(){
    if(!_fbRef){
      // _fbRef chưa sẵn sàng, thử lại sau 500ms
      setTimeout(saveToFirebase, 500);
      return;
    }
    var cur=null; for(var i=0;i<projects.length;i++){if(projects[i].id===selectedId){cur=projects[i];break;}}
    if(cur) syncP(cur);
    showSync('Đang lưu...');
    var data={};
    projects.forEach(function(p,i){
      var key=p.fbKey||('p'+Date.now()+'_'+i); p.fbKey=key;
      data[key]={name:p.name||'',status:p.status||'concept',phase:p.phase||'1',
        pic:p.pic||'',lastWeek:p.lastWeek||'',nextWeek:p.nextWeek||'',
        note:p.note||'',progress:p.progress||0,members:p.members||[],
        updatedBy:currentUser||'',updatedAt:Date.now(),_order:i};
    });
    _initialLoaded=false;
    _fbRef.set(data)
      .then(function(){showSync('Đã lưu ✓',1500);setTimeout(function(){_initialLoaded=true;},300);})
      .catch(function(err){showSync('Lỗi lưu: '+err.message,3000);_initialLoaded=true;});
  },700);
}

function showSync(msg,hide){
  var b=document.getElementById('sync-bar');
  document.getElementById('sync-lbl').textContent=msg;
  b.style.display='flex';
  if(hide) setTimeout(hideSync,hide);
}
function hideSync(){ document.getElementById('sync-bar').style.display='none'; }

// ── TABS ───────────────────────────────────────
function switchTab(t){
  document.getElementById('panel-input').classList.toggle('on',t==='input');
  document.getElementById('panel-report').classList.toggle('on',t==='report');
  document.getElementById('nav-to-input').style.display=t==='report'?'':'none';
  document.getElementById('nav-to-report').style.display=t==='input'?'':'none';
  document.getElementById('exp-btn').style.display=t==='report'?'':'none';
  if(t==='report') doRender();
}

// ── SYNC DOM → DATA ────────────────────────────
function syncP(p){
  if(!p) return;
  function gid(id){var el=document.getElementById(id);return el?el.value:null;}
  var n=gid('pn-'+p.id);   if(n!==null) p.name=n;
  var s=gid('ps-'+p.id);   if(s!==null) p.status=s;
  var ph=gid('pph-'+p.id); if(ph!==null) p.phase=ph;
  var lw=gid('pl-'+p.id);  if(lw!==null) p.lastWeek=lw;
  var nw=gid('pnx-'+p.id); if(nw!==null) p.nextWeek=nw;
  var no=gid('pno-'+p.id); if(no!==null) p.note=no;
  var ms=document.querySelector('.mbtn.on[data-pid="'+p.id+'"]');
  if(ms) p.progress=parseInt(ms.dataset.val);
  document.querySelectorAll('.eff-pct[data-pid="'+p.id+'"]').forEach(function(el){
    var m=null; for(var i=0;i<p.members.length;i++){if(p.members[i].name===el.dataset.member){m=p.members[i];break;}}
    if(m) m.pct=el.value;
  });
}
function syncSelected(){
  var p=null; for(var i=0;i<projects.length;i++){if(projects[i].id===selectedId){p=projects[i];break;}}
  if(p) syncP(p);
}

// ── CRUD ───────────────────────────────────────
// FIX: addProject giờ gọi saveToFirebase sau khi thêm
function addProject(preset){
  syncSelected();
  var id=++_pid;
  var p={id:id,name:'',status:'concept',phase:'1',pic:'',lastWeek:'',nextWeek:'',note:'',progress:0,members:[]};
  if(preset) Object.assign(p,preset,{id:id});
  projects.push(p); selectedId=id;
  renderSidebar(); renderForm(); schedRender();
  saveToFirebase(); // ← FIX: lưu ngay sau khi thêm dự án mới
}

function removeProject(id){
  syncSelected();
  projects=projects.filter(function(p){return p.id!==id;});
  if(selectedId===id) selectedId=projects.length?projects[projects.length-1].id:null;
  renderSidebar(); renderForm(); schedRender(); saveToFirebase();
}
function selectProject(id){ syncSelected(); selectedId=id; renderSidebar(); renderForm(); }

// ── INTERACTIONS ───────────────────────────────
function setMilestone(pid,val){
  document.querySelectorAll('.mbtn[data-pid="'+pid+'"]').forEach(function(b){b.classList.toggle('on',parseInt(b.dataset.val)===val);});
  var p=null; for(var i=0;i<projects.length;i++){if(projects[i].id===pid){p=projects[i];break;}}
  if(p){p.progress=val;updateSbItem(p);schedRender();saveToFirebase();}
}
function setPhase(pid,val){
  document.querySelectorAll('.pbtn[data-pid="'+pid+'"]').forEach(function(b){b.classList.toggle('on',parseInt(b.dataset.val)===val);});
  var h=document.getElementById('pph-'+pid); if(h) h.value=val;
  var p=null; for(var i=0;i<projects.length;i++){if(projects[i].id===pid){p=projects[i];break;}}
  if(p){p.phase=String(val);updateSbItem(p);schedRender();saveToFirebase();}
}
function setPIC(pid,name){
  var p=null; for(var i=0;i<projects.length;i++){if(projects[i].id===pid){p=projects[i];break;}}
  if(!p) return;
  p.pic=(p.pic===name)?'':name;
  var area=document.getElementById('pic-area-'+pid);
  if(area) area.innerHTML=buildPicHTML(p);
  updateSbItem(p); schedRender(); saveToFirebase();
}
function toggleMember(pid,name){
  var p=null; for(var i=0;i<projects.length;i++){if(projects[i].id===pid){p=projects[i];break;}}
  if(!p) return;
  document.querySelectorAll('.eff-pct[data-pid="'+pid+'"]').forEach(function(el){
    for(var i=0;i<p.members.length;i++){if(p.members[i].name===el.dataset.member){p.members[i].pct=el.value;break;}}
  });
  var idx=-1; for(var i=0;i<p.members.length;i++){if(p.members[i].name===name){idx=i;break;}}
  if(idx>-1) p.members.splice(idx,1); else p.members.push({name:name,pct:''});
  var area=document.getElementById('mem-area-'+pid);
  if(area){area.innerHTML=buildMemberHTML(p);bindPct(p);}
  schedRender(); saveToFirebase();
}

// ── SUBMIT ─────────────────────────────────────
function submitProject(pid){
  var p=null; for(var i=0;i<projects.length;i++){if(projects[i].id===pid){p=projects[i];break;}}
  if(!p) return;
  syncP(p);
  if(!_fbRef){ showSync('Chưa kết nối Firebase!',3000); return; }
  var hint=document.getElementById('shint-'+pid);
  var btn=document.querySelector('#pane-form .sub-btn');
  if(btn){btn.disabled=true;btn.textContent='Đang lưu...';}
  var data={};
  projects.forEach(function(pr,i){
    var key=pr.fbKey||('p'+Date.now()+'_'+i); pr.fbKey=key;
    data[key]={name:pr.name||'',status:pr.status||'concept',phase:pr.phase||'1',
      pic:pr.pic||'',lastWeek:pr.lastWeek||'',nextWeek:pr.nextWeek||'',
      note:pr.note||'',progress:pr.progress||0,members:pr.members||[],
      updatedBy:currentUser||'',updatedAt:Date.now(),_order:i};
  });
  _initialLoaded=false;
  _fbRef.set(data)
    .then(function(){
      if(btn){btn.disabled=false;btn.innerHTML='<svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 7h10M7 2l5 5-5 5"/></svg> Lưu dự án';}
      if(hint){hint.style.color='#16A34A';hint.textContent='✓ Đã lưu thành công';setTimeout(function(){if(hint)hint.textContent='';},3000);}
      setTimeout(function(){_initialLoaded=true;},300);
    })
    .catch(function(err){
      if(btn) btn.disabled=false;
      if(hint){hint.style.color='#DC2626';hint.textContent='Lỗi: '+err.message;}
      _initialLoaded=true;
    });
}

// ── BUILD HTML ─────────────────────────────────
function buildPicHTML(p){
  var html='';
  for(var i=0;i<PIC_LIST.length;i++){
    var tm=PIC_LIST[i]; var sel=p.pic===tm.name;
    html+='<button type="button" class="chip'+(sel?' on':'')+'" onclick="setPIC('+p.id+',\''+tm.name+'\')">'
        +esc(tm.name)+'<span class="crole"> · '+esc(tm.role)+'</span></button>';
  }
  return html;
}
function buildMemberHTML(p){
  var chips='';
  for(var i=0;i<ALL_MEMBERS.length;i++){
    var tm=ALL_MEMBERS[i];
    var sel=false; for(var j=0;j<p.members.length;j++){if(p.members[j].name===tm.name){sel=true;break;}}
    chips+='<button type="button" class="chip'+(sel?' on':'')+'" onclick="toggleMember('+p.id+',\''+tm.name+'\')">'
          +esc(tm.name)+'<span class="crole"> · '+esc(tm.role)+'</span></button>';
  }
  var effort='';
  if(p.members.length){
    effort='<div class="effort-list">';
    for(var k=0;k<p.members.length;k++){
      var m=p.members[k];
      effort+='<div class="effort-row">'
             +'<span class="effort-nm">'+esc(m.name)+'</span>'
             +'<div class="effort-w">'
             +'<input type="number" min="0" max="100" class="eff-pct"'
             +' data-pid="'+p.id+'" data-member="'+esc(m.name)+'"'
             +' value="'+esc(m.pct)+'" placeholder="0">'
             +'<span class="effort-u">%</span></div></div>';
    }
    effort+='</div>';
  } else {
    effort='<div style="font-size:12px;color:var(--t3);padding-top:4px">Chọn thành viên ở trên để nhập effort.</div>';
  }
  return '<div class="chips">'+chips+'</div>'+effort;
}
function bindPct(p){
  document.querySelectorAll('.eff-pct[data-pid="'+p.id+'"]').forEach(function(el){
    var mn=el.dataset.member;
    el.addEventListener('input',function(){
      for(var i=0;i<p.members.length;i++){if(p.members[i].name===mn){p.members[i].pct=el.value;break;}}
      saveToFirebase();
    });
  });
}

// ── SIDEBAR ────────────────────────────────────
function renderSidebar(){
  var list=document.getElementById('sb-list');
  if(!projects.length){list.innerHTML='<div class="sb-empty">Chưa có dự án.<br>Bấm "Thêm dự án" để bắt đầu.</div>';return;}
  var html='';
  for(var i=0;i<projects.length;i++){
    var p=projects[i]; var c=SC(p.status);
    html+='<div class="sb-item'+(p.id===selectedId?' on':'')+'" onclick="selectProject('+p.id+')" id="sbi-'+p.id+'">'
        +'<span class="sb-dot" style="background:'+c.bar+'"></span>'
        +'<div class="sb-body">'
        +'<div class="sb-nm'+(p.name?'':' empty')+'">'+(p.name?esc(p.name):'Chưa đặt tên')+'</div>'
        +'<div class="sb-m2">'+(p.phase?'Phase '+p.phase+' · ':'')+c.lbl+(p.pic?' · '+p.pic:'')+'</div>'
        +'</div>'
        +'<button class="sb-del" onclick="event.stopPropagation();removeProject('+p.id+')">×</button>'
        +'</div>';
  }
  list.innerHTML=html;
  var a=list.querySelector('.sb-item.on'); if(a) a.scrollIntoView({block:'nearest'});
}
function updateSbItem(p){
  var el=document.getElementById('sbi-'+p.id); if(!el) return;
  var c=SC(p.status);
  el.querySelector('.sb-dot').style.background=c.bar;
  var n=el.querySelector('.sb-nm');
  n.textContent=p.name||'Chưa đặt tên';
  n.className='sb-nm'+(p.name?'':' empty');
  el.querySelector('.sb-m2').textContent=(p.phase?'Phase '+p.phase+' · ':'')+c.lbl+(p.pic?' · '+p.pic:'');
}

// ── FORM ───────────────────────────────────────
function renderForm(){
  var emEl=document.getElementById('pane-empty');
  var form=document.getElementById('pane-form');
  var p=null; for(var i=0;i<projects.length;i++){if(projects[i].id===selectedId){p=projects[i];break;}}
  if(!p){emEl.style.display='';form.style.display='none';return;}
  emEl.style.display='none'; form.style.display='';
  var msHTML='';
  for(var i=0;i<MILESTONES.length;i++){
    var v=MILESTONES[i];
    msHTML+='<button class="mbtn'+(p.progress===v?' on':'')+'" data-pid="'+p.id+'" data-val="'+v+'" onclick="setMilestone('+p.id+','+v+')">'+v+'%</button>';
  }
  var phHTML='';
  for(var j=0;j<PHASES.length;j++){
    var pv=PHASES[j];
    phHTML+='<button class="pbtn'+(String(p.phase)===String(pv)?' on':'')+'" data-pid="'+p.id+'" data-val="'+pv+'" onclick="setPhase('+p.id+','+pv+')">Phase '+pv+'</button>';
  }
  var statusOpts='';
  for(var k=0;k<STATUSES.length;k++){
    var s=STATUSES[k];
    statusOpts+='<option value="'+s.val+'"'+(p.status===s.val?' selected':'')+'>'+s.lbl+'</option>';
  }
  form.innerHTML=''
    +'<div class="fsec">'
    +'<div style="margin-bottom:4px">'
    +'<input id="pn-'+p.id+'" type="text" value="'+esc(p.name)+'" placeholder="Tên dự án..."'
    +' style="font-size:18px;font-weight:700;border:none;border-bottom:2px solid var(--bdrm);outline:none;background:transparent;color:var(--t1);width:100%;font-family:var(--font);padding-bottom:6px">'
    +'</div>'
    +'<div class="fcard"><div class="fcard-t">Thông tin chung</div>'
    +'<div class="frow"><div class="fld"><label>Trạng thái</label>'
    +'<select class="ssel" id="ps-'+p.id+'">'+statusOpts+'</select>'
    +'</div></div>'
    +'<div class="fld"><label>PIC</label>'
    +'<div class="chips" id="pic-area-'+p.id+'" style="margin-bottom:0">'+buildPicHTML(p)+'</div>'
    +'</div></div>'
    +'<div class="fcard"><div class="fcard-t">Phase dự án</div>'
    +'<div class="pgroup">'+phHTML+'</div>'
    +'<input type="hidden" id="pph-'+p.id+'" value="'+esc(p.phase||'1')+'"></div>'
    +'<div class="fcard"><div class="fcard-t">Tiến độ</div>'
    +'<div class="milestones">'+msHTML+'</div></div>'
    +'<div class="fcard"><div class="fcard-t">Nội dung tuần</div>'
    +'<div class="frow">'
    +'<div class="fld"><label>Tuần trước đã làm</label>'
    +'<textarea id="pl-'+p.id+'" rows="3" placeholder="Mô tả công việc tuần trước...">'+esc(p.lastWeek)+'</textarea></div>'
    +'<div class="fld"><label>Kế hoạch tuần tới</label>'
    +'<textarea id="pnx-'+p.id+'" rows="3" placeholder="Dự kiến tuần sau...">'+esc(p.nextWeek)+'</textarea></div>'
    +'</div>'
    +'<div class="fld"><label>Ghi chú / Risk / Issue</label>'
    +'<textarea id="pno-'+p.id+'" rows="2" placeholder="Ghi chú, risk, issue...">'+esc(p.note)+'</textarea></div>'
    +'</div>'
    +'<div class="fcard"><div class="fcard-t">Nguồn lực</div>'
    +'<div id="mem-area-'+p.id+'">'+buildMemberHTML(p)+'</div></div>'
    +'<button class="sub-btn" onclick="submitProject('+p.id+')">'
    +'<svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 7h10M7 2l5 5-5 5"/></svg>'
    +' Lưu dự án</button>'
    +'<div class="sub-hint" id="shint-'+p.id+'"></div>'
    +'</div><div class="pad"></div>';

  function bind(id,key){
    var el=document.getElementById(id); if(!el) return;
    el.addEventListener('input',function(){p[key]=el.value;updateSbItem(p);schedRender();saveToFirebase();});
  }
  bind('pn-'+p.id,'name');
  bind('pl-'+p.id,'lastWeek');
  bind('pnx-'+p.id,'nextWeek');
  bind('pno-'+p.id,'note');
  var sel=document.getElementById('ps-'+p.id);
  if(sel) sel.addEventListener('change',function(){p.status=sel.value;updateSbItem(p);schedRender();saveToFirebase();});
  bindPct(p);
}

// ── REPORT ─────────────────────────────────────
function schedRender(){ clearTimeout(_rt); _rt=setTimeout(doRender,120); }

function doRender(){
  var week=gv('m-week')||'—';
  var rep=gv('m-reporter')||'ChauPV';
  var team=gv('m-team')||'UIUX PMO';
  var pend=[],done=[],cards=[];
  projects.forEach(function(p){
    if(p.status==='pending') pend.push(p);
    else if(p.status==='completed') done.push(p);
    else cards.push(p);
  });
  var total=projects.length;
  var emEl=document.getElementById('rpt-empty');
  var body=document.getElementById('rpt-body');
  if(!total){emEl.style.display='';body.style.display='none';return;}
  emEl.style.display='none'; body.style.display='';
  var now=new Date();
  var ds=now.toLocaleDateString('vi-VN',{day:'2-digit',month:'2-digit',year:'numeric'});

  var counts={};
  projects.forEach(function(p){var l=SL(p.status);counts[l]=(counts[l]||0)+1;});
  var scoreHTML='<div class="mc"><div class="mc-l">Tổng dự án</div><div class="mc-v">'+total+'</div><div class="mc-s">theo dõi</div></div>';
  STATUSES.forEach(function(s){if((counts[s.lbl]||0)>0) scoreHTML+='<div class="mc"><div class="mc-l">'+s.lbl+'</div><div class="mc-v" style="color:'+s.tx+'">'+counts[s.lbl]+'</div><div class="mc-s">dự án</div></div>';});

  var chartArr=projects.filter(function(p){return p.status!=='cancel';}).slice().sort(function(a,b){return (b.progress||0)-(a.progress||0);});
  var chartHTML='';
  chartArr.forEach(function(p){
    var c=SC(p.status); var pct=Math.max(0,Math.min(100,p.progress||0));
    var na=p.status==='pending'&&pct===0;
    chartHTML+='<div class="cbar-row">'
      +'<div class="cbar-n" title="'+esc(p.name)+'">'+(p.name?esc(p.name):'<em>Chưa đặt tên</em>')+'</div>'
      +'<div class="cbar-t"><div class="cbar-f" style="width:'+pct+'%;background:'+c.bar+'"></div></div>'
      +'<div class="cbar-p"'+(na?' style="color:var(--t3)"':'')+'>'+( na?'—':pct+'%')+'</div></div>';
  });
  var usedSt=[]; projects.forEach(function(p){if(usedSt.indexOf(p.status)<0) usedSt.push(p.status);});
  var legHTML='';
  usedSt.forEach(function(v){var c=SC(v);legHTML+='<div class="leg-i"><span class="leg-d" style="background:'+c.bar+'"></span>'+c.lbl+'</div>';});

  function buildDots(p){
    var c=SC(p.status); var html='';
    MILESTONES.forEach(function(v){
      var hit=(p.progress||0)>=v;
      html+='<span class="msdot'+(hit?' hit':'')+'"'+(hit?' style="--dc:'+c.bar+'"':'')+' ></span>';
    });
    return html;
  }
  function buildPills(p){
    if(!p.members||!p.members.length) return '';
    var html='<div class="mpills">';
    p.members.forEach(function(m){
      html+='<span class="mpill"><svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="5" cy="3.5" r="1.8"/><path d="M1.5 8.5c0-1.93 1.57-3.5 3.5-3.5s3.5 1.57 3.5 3.5"/></svg>'+esc(m.name)+(m.pct?' <span class="mpill-p">'+esc(m.pct)+'%</span>':'')+'</span>';
    });
    return html+'</div>';
  }

  var cardsHTML='';
  cards.forEach(function(p){
    var c=SC(p.status); var pct=Math.max(0,Math.min(100,p.progress||0));
    var hasNote=p.note&&p.note.trim(); var hasMem=p.members&&p.members.length>0;
    cardsHTML+='<div class="rcard'+(hasNote?' risky':'')+'">'
      +'<div class="rcard-top">'
      +'<div class="rcard-nm">'+(p.name?esc(p.name):'<em style="color:var(--t3);font-weight:400">Chưa đặt tên</em>')+'</div>'
      +'<span class="spill" style="background:'+c.bg+';border:1px solid '+c.bd+';color:'+c.tx+'">'+SL(p.status)+'</span>'
      +'</div>'
      +(p.pic?'<div style="font-size:11px;color:var(--t2);display:flex;align-items:center;gap:4px">'
        +'<svg width="11" height="11" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="5" cy="3.5" r="1.8"/><path d="M1.5 8.5c0-1.93 1.57-3.5 3.5-3.5s3.5 1.57 3.5 3.5"/></svg>'
        +'<span style="font-weight:600">PIC:</span> '+esc(p.pic)+'</div>':'')
      +'<div><div class="pm-m"><span>Tiến độ</span><span>'+pct+'%</span></div>'
      +'<div class="pm-t"><div class="pm-f" style="width:'+pct+'%;background:'+c.bar+'"></div></div>'
      +'<div class="pm-dots">'+buildDots(p)+'</div></div>'
      +'<hr class="cdiv">'
      +(p.lastWeek?'<div class="crow"><span class="crow-ic">↩</span><div><div class="crow-l">Tuần trước</div><div class="crow-tx">'+esc(p.lastWeek)+'</div></div></div>':'')
      +(p.nextWeek?'<div class="crow"><span class="crow-ic">📅</span><div><div class="crow-l">Kế hoạch tuần tới</div><div class="crow-tx">'+esc(p.nextWeek)+'</div></div></div>':'')
      +(hasNote?'<div class="nbox"><div class="nbox-l">Ghi chú / Risk</div>'+esc(p.note)+'</div>':'')
      +(hasMem?'<div class="cres"><div class="crow-l" style="margin-bottom:5px">Nguồn lực</div>'+buildPills(p)+'</div>':'')
      +'</div>';
  });

  var pendHTML='';
  pend.forEach(function(p){pendHTML+='<div class="pend-row"><div class="pend-nm">'+(p.name?esc(p.name):'Chưa đặt tên')+'</div><div class="pend-nt">'+esc(p.note||p.lastWeek||'Không có cập nhật mới')+'</div></div>';});
  var doneHTML='';
  done.forEach(function(p){doneHTML+='<div class="done-row"><div class="pend-nm">'+(p.name?esc(p.name):'Chưa đặt tên')+'</div><div class="pend-nt">'+esc(p.lastWeek||p.note||'Đã hoàn thành')+'</div></div>';});

  body.innerHTML=''
    +'<div class="rh">'
    +'<div><div class="rh-kick">FIS · '+esc(team)+'</div><div class="rh-title">Báo cáo tiến độ dự án</div><div class="rh-sub">Tổng hợp trạng thái & kế hoạch tuần tới</div></div>'
    +'<div class="rh-r"><div class="rh-wk">Tuần '+esc(week)+' · '+now.getFullYear()+'</div><div class="rh-by">Người lập: '+esc(rep)+'</div><div class="rh-by" style="margin-top:2px">'+ds+'</div></div>'
    +'</div>'
    +'<div class="metrics">'+scoreHTML+'</div>'
    +'<div class="sec-h">Tiến độ theo dự án</div>'
    +'<div class="cblock">'+(chartHTML||'<div class="empty-msg" style="padding:.75rem">Chưa có dữ liệu</div>')+'<div class="cleg">'+legHTML+'</div></div>'
    +(cards.length?'<div class="sec-h">Chi tiết dự án</div><div class="pgrid">'+cardsHTML+'</div>':'')
    +(pend.length?'<div class="sec-h">Pending / Chờ phản hồi</div><div class="pend-list">'+pendHTML+'</div>':'')
    +(done.length?'<div class="sec-h">Completed / Hoàn thành</div><div class="pend-list">'+doneHTML+'</div>':'')
    +'<div class="rfoot"><span>Báo cáo tuần '+esc(week)+' · FIS · '+esc(team)+'</span><span class="rfoot-r">Người lập: '+esc(rep)+'</span></div>';
}

// ── EXPORT ─────────────────────────────────────
function doExport(){
  if(!document.getElementById('panel-report').classList.contains('on')){switchTab('report');setTimeout(_runExport,350);}
  else _runExport();
}
function _runExport(){
  var btn=document.getElementById('exp-btn');
  btn.disabled=true; btn.textContent='Đang xuất...';
  document.getElementById('topnav').style.display='none';
  document.getElementById('sync-bar').style.display='none';
  html2canvas(document.getElementById('rpt-print'),{scale:2,useCORS:true,backgroundColor:'#ffffff',logging:false})
  .then(function(canvas){
    var a=document.createElement('a');
    a.download='bao-cao-tuan-'+(gv('m-week')||'xx')+'.png';
    a.href=canvas.toDataURL('image/png'); a.click();
    document.getElementById('topnav').style.display='';
    btn.disabled=false;
    btn.innerHTML='<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:13px;height:13px"><path d="M8 2v8M5 7l3 3 3-3M2 12v1a1 1 0 001 1h10a1 1 0 001-1v-1"/></svg> Xuất PNG';
  }).catch(function(){
    document.getElementById('topnav').style.display='';
    btn.disabled=false; btn.textContent='Xuất PNG';
    alert('Lỗi xuất PNG.');
  });
}

document.addEventListener('DOMContentLoaded', initLogin);
</script>
