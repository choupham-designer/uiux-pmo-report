<style>
:root{
  --bg-page:#EEEDE8;--bg-surface:#FFFFFF;--bg-subtle:#EEEDE8;
  --border:rgba(0,0,0,0.08);--border-md:rgba(0,0,0,0.13);
  --text-1:#181815;--text-2:#62625D;--text-3:#9E9E98;
  --radius:12px;--radius-sm:8px;--radius-xs:6px;
  --font:'Plus Jakarta Sans',sans-serif;--mono:'JetBrains Mono',monospace;
  --primary:#000000;--primary-hover:#222222;
  --accent:oklch(64.6% 0.222 41.116);
  --accent-bg:oklch(96% 0.04 41.116);
  --accent-bd:oklch(82% 0.12 41.116);
  --accent-tx:oklch(38% 0.18 41.116);
  --s-est-bg:#E0F2FE;--s-est-bd:#7DD3FC;--s-est-tx:#075985;--s-est-bar:#0284C7;
  --s-con-bg:#EDE9FE;--s-con-bd:#C4B5FD;--s-con-tx:#5B21B6;--s-con-bar:#7C3AED;
  --s-flo-bg:#F5F3FF;--s-flo-bd:#DDD6FE;--s-flo-tx:#6D28D9;--s-flo-bar:#8B5CF6;
  --s-pkg-bg:#EEF2FF;--s-pkg-bd:#A5B4FC;--s-pkg-tx:#3730A3;--s-pkg-bar:#4F46E5;
  --s-han-bg:#DBEAFE;--s-han-bd:#93C5FD;--s-han-tx:#1E3A8A;--s-han-bar:#2563EB;
  --s-upd-bg:#CCFBF1;--s-upd-bd:#5EEAD4;--s-upd-tx:#134E4A;--s-upd-bar:#0D9488;
  --s-tst-bg:#FFE4E6;--s-tst-bd:#FDA4AF;--s-tst-tx:#881337;--s-tst-bar:#E11D48;
  --s-pen-bg:#FEF3C7;--s-pen-bd:#FCD34D;--s-pen-tx:#92400E;--s-pen-bar:#D97706;
  --s-don-bg:#DCFCE7;--s-don-bd:#86EFAC;--s-don-tx:#166534;--s-don-bar:#16A34A;
  --s-can-bg:#FEE2E2;--s-can-bd:#FCA5A5;--s-can-tx:#991B1B;--s-can-bar:#DC2626;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--font);background:var(--bg-page);color:var(--text-1);min-height:100vh}

/* ── Login ── */
#login-screen{
  position:fixed;inset:0;z-index:999;
  background:var(--bg-page);
  display:flex;align-items:center;justify-content:center;
  padding:1rem;
}
.login-card{
  background:#fff;border-radius:var(--radius);border:1px solid var(--border);
  padding:2rem;width:100%;max-width:560px;
  display:flex;flex-direction:column;gap:1.5rem;
}
.login-brand{display:flex;align-items:center;gap:10px}
.login-brand-mark{
  width:34px;height:34px;border-radius:8px;background:var(--primary);
  display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:700;color:#fff;
}
.login-title{font-size:20px;font-weight:700;color:var(--text-1);margin-top:.25rem}
.login-sub{font-size:13px;color:var(--text-2);margin-top:3px}
.login-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:8px;
}
.login-chip{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:12px 8px;border-radius:var(--radius-sm);
  border:1.5px solid var(--border-md);background:var(--bg-subtle);
  font-family:var(--font);cursor:pointer;transition:all .15s;text-align:center;
  gap:3px;
}
.login-chip:hover{border-color:var(--accent-bd);background:var(--accent-bg)}
.login-chip.active{border-color:var(--accent);background:var(--accent-bg)}
.login-chip-name{font-size:13px;font-weight:600;color:#000}
.login-chip-role{font-size:11px;color:var(--text-3);font-weight:400}
.login-chip.active .login-chip-name{color:var(--accent-tx)}
.login-chip.active .login-chip-role{color:var(--accent-tx);opacity:.75}
.login-btn{
  background:var(--primary);color:#fff;border:none;border-radius:var(--radius-xs);
  padding:11px;font-family:var(--font);font-size:14px;font-weight:600;
  cursor:pointer;transition:opacity .15s;
}
.login-btn:disabled{opacity:.35;cursor:not-allowed}
.login-btn:not(:disabled):hover{opacity:.82}

/* ── Sync bar ── */
.sync-bar{
  position:fixed;bottom:1rem;right:1rem;z-index:200;
  background:#000;color:#fff;font-size:12px;font-weight:500;
  padding:7px 14px;border-radius:20px;
  display:none;align-items:center;gap:7px;
  font-family:var(--font);
}
.sync-dot{width:6px;height:6px;border-radius:50%;background:#4ade80;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ── Nav ── */
.topnav{
  background:var(--bg-surface);border-bottom:1px solid var(--border);
  padding:0 2rem;display:flex;align-items:center;
  justify-content:space-between;height:56px;
  position:sticky;top:0;z-index:100;
}
.brand{display:flex;align-items:center;gap:10px}
.brand-mark{width:30px;height:30px;border-radius:8px;background:var(--primary);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;}
.brand-name{font-size:13px;font-weight:700;color:var(--text-1)}
.brand-sep{color:var(--border-md)}
.brand-sub{font-size:12px;color:var(--text-2)}
.brand-user{
  font-size:11px;font-weight:600;color:var(--accent-tx);
  background:var(--accent-bg);padding:3px 10px;border-radius:20px;
  margin-left:4px;cursor:pointer;
}
.brand-user:hover{background:var(--accent-bd)}
.nav-tabs{display:flex;gap:2px}
.nav-tab{
  padding:6px 18px;border-radius:var(--radius-xs);
  font-size:13px;font-weight:500;cursor:pointer;
  border:none;background:transparent;color:var(--text-2);
  transition:all .15s;display:flex;align-items:center;gap:6px;font-family:var(--font);
}
.nav-tab:hover{background:var(--bg-subtle);color:var(--text-1)}
.nav-tab.active{background:var(--bg-subtle);color:var(--text-1);font-weight:600}
.tab-pip{width:6px;height:6px;border-radius:50%;background:var(--accent);display:none}
.nav-tab.active .tab-pip{display:block}
.nav-actions{display:flex;gap:8px;align-items:center}
.btn{
  display:inline-flex;align-items:center;gap:6px;padding:7px 14px;
  border-radius:var(--radius-xs);font-size:12px;font-weight:600;cursor:pointer;
  border:1px solid var(--border-md);background:var(--bg-surface);
  color:var(--text-1);font-family:var(--font);transition:all .15s;
}
.btn:hover{background:var(--bg-subtle)}
.btn-primary{background:var(--primary);color:#fff;border-color:transparent}
.btn-primary:hover{background:var(--primary-hover)}
.btn-primary:disabled{opacity:.55;cursor:not-allowed}
.btn svg{width:13px;height:13px;flex-shrink:0}

/* ── Panels ── */
.tab-panel{display:none}
.tab-panel.active{display:block}

/* ══ INPUT TAB ══ */
.input-shell{display:flex;align-items:flex-start;max-width:1100px;margin:0 auto;min-height:calc(100vh - 56px);}
.input-sidebar{
  width:240px;flex-shrink:0;display:flex;flex-direction:column;
  background:var(--bg-surface);border:1px solid var(--border);border-radius:6px;
  position:sticky;top:calc(56px + 1.5rem);max-height:calc(100vh - 56px - 3rem);
  overflow:hidden;margin:1.5rem 0 1.5rem 1.5rem;align-self:flex-start;
}
.sidebar-meta{padding:16px 14px 12px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:8px;}
.sidebar-list{flex:1;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:2px;}
.sidebar-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--radius-xs);cursor:pointer;transition:all .15s;border:1px solid transparent;min-height:44px;}
.sidebar-item:hover{background:var(--accent-bg)}
.sidebar-item.active{background:var(--accent-bg);border-color:var(--accent-bd)}
.sidebar-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sidebar-item-body{flex:1;min-width:0}
.sidebar-item-name{font-size:12px;font-weight:600;color:var(--text-1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.35;}
.sidebar-item-name.empty{color:var(--text-3);font-weight:400;font-style:italic}
.sidebar-item-meta{font-size:11px;color:var(--text-3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sidebar-item-del{width:20px;height:20px;border:none;background:transparent;cursor:pointer;color:var(--text-3);font-size:14px;border-radius:4px;flex-shrink:0;display:flex;align-items:center;justify-content:center;opacity:0;transition:all .15s;}
.sidebar-item:hover .sidebar-item-del{opacity:1}
.sidebar-item-del:hover{background:#FEE2E2;color:#DC2626}
.sidebar-empty-hint{padding:2rem 1rem;text-align:center;font-size:12px;color:var(--text-3);line-height:1.6;}

.input-pane{flex:1;padding:2rem;display:flex;flex-direction:column;min-height:calc(100vh - 56px);}
.pane-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;color:var(--text-3);font-size:13px;text-align:center;}
.pane-empty svg{opacity:.3}

/* Form */
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-size:12px;font-weight:600;color:var(--text-2)}
.field input,.field textarea,.field select{
  font-family:var(--font);font-size:13px;padding:8px 11px;border-radius:var(--radius-xs);
  border:1px solid var(--border-md);background:var(--bg-surface);
  color:var(--text-1);outline:none;transition:border .15s;resize:vertical;
}
.field input:focus,.field textarea:focus,.field select:focus{
  border-color:var(--accent);box-shadow:0 0 0 3px oklch(64.6% 0.222 41.116/0.15);
}
.field textarea{line-height:1.55}
.form-section{display:flex;flex-direction:column;gap:12px}
.form-card{background:#fff;border-radius:var(--radius-sm);border:1px solid var(--border);padding:1rem 1.125rem;display:flex;flex-direction:column;gap:12px;}
.form-card-title{font-size:14px;font-weight:700;color:#000}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-row.full{grid-template-columns:1fr}

/* Phase / Milestone / Chips */
.phase-group{display:flex;gap:6px}
.phase-btn{flex:1;padding:7px 4px;border-radius:var(--radius-xs);border:none;background:var(--bg-subtle);font-family:var(--mono);font-size:12px;font-weight:400;color:#000;cursor:pointer;text-align:center;transition:all .15s;}
.phase-btn:hover{background:var(--accent-bg);color:var(--accent-tx)}
.phase-btn.active{background:var(--accent);color:#fff}
.milestones{display:flex;gap:6px}
.ms-btn{flex:1;padding:8px 4px;border-radius:var(--radius-xs);border:none;background:var(--bg-subtle);font-family:var(--mono);font-size:12px;font-weight:400;color:#000;cursor:pointer;text-align:center;transition:all .15s;}
.ms-btn:hover{background:var(--accent-bg);color:var(--accent-tx)}
.ms-btn.active{background:var(--accent);color:#fff;font-weight:600}
.status-sel{font-family:var(--font);font-size:13px;font-weight:500;padding:8px 11px;border-radius:var(--radius-xs);border:1px solid var(--border-md);outline:none;cursor:pointer;width:100%;background:var(--bg-surface);color:var(--text-1);}
.member-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.member-chip{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:20px;border:none;background:var(--bg-subtle);font-family:var(--font);font-size:12px;font-weight:400;color:#000;cursor:pointer;transition:all .15s;}
.member-chip:hover{background:var(--accent-bg);color:var(--accent-tx)}
.member-chip.selected{background:var(--accent);color:#fff}
.member-chip.selected .chip-role{color:rgba(255,255,255,.75)}
.chip-role{font-size:11px;color:var(--text-3)}
.effort-list{display:flex;flex-direction:column;gap:6px;padding-top:4px}
.effort-row{display:flex;align-items:center;gap:10px}
.effort-name{font-size:12px;font-weight:600;color:var(--text-1);min-width:110px}
.effort-input-wrap{display:flex;align-items:center;gap:4px}
.effort-input-wrap input{width:64px;font-family:var(--mono);font-size:13px;text-align:right;padding:5px 8px;border-radius:var(--radius-xs);border:1px solid var(--border-md);background:var(--bg-surface);color:var(--text-1);outline:none;}
.effort-input-wrap input:focus{border-color:var(--accent);box-shadow:0 0 0 2px oklch(64.6% 0.222 41.116/0.15)}
.effort-input-wrap input::-webkit-inner-spin-button,.effort-input-wrap input::-webkit-outer-spin-button{-webkit-appearance:none}
.effort-unit{font-size:12px;font-weight:600;color:var(--text-2)}
.add-member-btn{display:inline-flex;align-items:center;gap:5px;font-family:var(--font);font-size:12px;font-weight:500;color:var(--accent-tx);background:var(--accent-bg);border:1px solid var(--accent-bd);border-radius:var(--radius-xs);padding:5px 10px;cursor:pointer;transition:all .15s;align-self:flex-start;}
.add-member-btn:hover{background:var(--accent-bd)}
.form-bottom-pad{height:2rem}

/* ══ REPORT TAB ══ */
.report-wrap{max-width:800px;margin:0 auto;padding:2rem 1.5rem 5rem}
#rpt-printable{background:var(--bg-page);border:none;border-radius:var(--radius);padding:2rem 2rem 1.5rem;}
.rpt-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1.75rem;padding-bottom:1.25rem;border-bottom:1px solid var(--border);}
.rpt-kicker{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text-3);margin-bottom:5px}
.rpt-title{font-size:24px;font-weight:700;line-height:1.15}
.rpt-sub{font-size:13px;color:var(--text-2);margin-top:4px}
.rpt-right{text-align:right}
.rpt-week{font-family:var(--mono);font-size:13px;font-weight:500}
.rpt-by{font-size:12px;color:var(--text-2);margin-top:3px}
.metrics{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:1.5rem;}
@media(max-width:640px){.metrics{grid-template-columns:repeat(2,minmax(0,1fr))}}
.mc{background:#fff;border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px 16px}
.mc-lbl{font-size:11px;font-weight:700;color:var(--text-2);letter-spacing:.04em;text-transform:uppercase;margin-bottom:6px}
.mc-val{font-size:28px;font-weight:700;line-height:1}
.mc-sub{font-size:11px;color:var(--text-3);margin-top:5px}
.sec-head{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--text-3);margin:1.25rem 0 10px;display:flex;align-items:center;gap:8px;}
.sec-head::after{content:'';flex:1;height:1px;background:var(--border)}
.chart-block{background:#fff;border:1px solid var(--border);border-radius:var(--radius-sm);padding:1rem 1.25rem}
.cbar-row{display:flex;align-items:center;gap:10px;padding:5px 0}
.cbar-name{font-size:12px;color:var(--text-2);flex:0 0 38%;min-width:80px;max-width:200px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cbar-track{flex:1;height:7px;background:rgba(0,0,0,.07);border-radius:4px;overflow:hidden}
.cbar-fill{height:100%;border-radius:4px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.cbar-pct{font-family:var(--mono);font-size:11px;font-weight:500;min-width:34px;text-align:right}
.chart-legend{display:flex;gap:12px;flex-wrap:wrap;margin-top:12px;padding-top:10px;border-top:1px solid var(--border)}
.leg-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text-2)}
.leg-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.proj-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(100%,280px),1fr));gap:12px}
.rpt-card{background:#fff;border-radius:var(--radius-sm);padding:1rem;display:flex;flex-direction:column;gap:9px;border:1px solid var(--border);}
.rpt-card.risky{border-color:rgba(220,38,38,.25)}
.rpt-card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:6px}
.rpt-card-name{font-size:13px;font-weight:700;flex:1;line-height:1.35}
.spill{font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;white-space:nowrap;flex-shrink:0;letter-spacing:.02em}
.pmini-meta{display:flex;justify-content:space-between;font-size:11px;color:var(--text-2);margin-bottom:4px}
.pmini-track{height:4px;background:rgba(0,0,0,.08);border-radius:2px;overflow:hidden}
.pmini-fill{height:100%;border-radius:2px}
.pmini-dots{display:flex;gap:3px;margin-top:5px}
.ms-dot{width:8px;height:8px;border-radius:50%;background:rgba(0,0,0,.1)}
.ms-dot.hit{background:var(--dot-color,#D97706)}
.cdiv{border:none;border-top:1px solid var(--border)}
.crow{display:flex;gap:7px;align-items:flex-start}
.crow-ic{font-size:12px;color:var(--text-3);flex-shrink:0;line-height:1.6}
.crow-lbl{font-size:10px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.05em}
.crow-txt{font-size:12px;color:var(--text-1);line-height:1.55;margin-top:1px}
.note-box{background:#FFFBEB;border:1px solid #FDE68A;border-radius:var(--radius-xs);padding:8px 10px;font-size:12px;color:#92400E;line-height:1.55;}
.note-box-lbl{font-size:10px;font-weight:700;color:#B45309;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.card-resource{margin-top:auto;padding-top:6px;border-top:1px solid var(--border)}
.member-pills{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
.member-pill{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;background:var(--bg-surface);border:1px solid var(--border-md);color:var(--text-1);}
.member-pill-pct{font-family:var(--mono);font-size:10px;color:var(--text-2)}
.pend-list{display:flex;flex-direction:column;gap:8px}
.pend-row{display:flex;gap:14px;align-items:flex-start;background:#fff;border-radius:var(--radius-sm);padding:10px 14px;border-left:3px solid var(--s-pen-bar);}
.done-row{display:flex;gap:14px;align-items:flex-start;background:#fff;border-radius:var(--radius-sm);padding:10px 14px;border-left:3px solid var(--s-don-bar);}
.pend-name{font-size:13px;font-weight:700;flex:0 0 auto;min-width:100px;max-width:180px}
.pend-note{font-size:12px;color:var(--text-2);line-height:1.55}
.rpt-footer{display:flex;justify-content:space-between;align-items:center;margin-top:1.5rem;padding-top:1rem;border-top:1px solid var(--border);font-size:11px;color:var(--text-3);}
.rpt-footer-r{font-family:var(--mono)}
.empty-msg{text-align:center;padding:3rem 1rem;font-size:13px;color:var(--text-3)}

/* Responsive */
@media(max-width:600px){
  .topnav{padding:0 1rem}
  .brand-sep,.brand-sub{display:none}
  .btn:not(.btn-primary){display:none}
  .nav-tab{padding:6px 12px;font-size:12px}
}
@media(max-width:640px){
  .input-shell{flex-direction:column}
  .input-sidebar{width:100%;position:static;margin:0;border-radius:0;border-left:none;border-right:none;max-height:none}
  .sidebar-list{flex-direction:row;flex-wrap:nowrap;overflow-x:auto;overflow-y:hidden;padding:8px;gap:6px}
  .sidebar-item{flex-shrink:0;min-width:140px;max-width:180px}
  .sidebar-item-del{opacity:1}
  .input-pane{padding:1.25rem;min-height:auto}
  .login-grid{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:480px){
  .form-row{grid-template-columns:1fr}
  .phase-group{flex-wrap:wrap}
  .phase-btn{flex:0 0 calc(33.33% - 5px)}
  .proj-grid{grid-template-columns:1fr}
  .rpt-header{flex-direction:column;gap:8px}
  .rpt-right{text-align:left}
}
@media(min-width:561px) and (max-width:800px){

}

}
</style>

<body>

      <div>Chọn dự án từ danh sách bên trái<br>hoặc thêm dự án mới để bắt đầu</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
// ══════════════════════════════════════════════
// CONSTANTS
// ══════════════════════════════════════════════
const MILESTONES = [0,25,50,75,100];
const PHASES = [1,2,3,4,5];

const STATUSES = [
  {val:'estimate', lbl:'Estimate Effort',bg:'var(--s-est-bg)',bd:'var(--s-est-bd)',tx:'var(--s-est-tx)',bar:'var(--s-est-bar)'},
  {val:'concept',  lbl:'UI Concept',     bg:'var(--s-con-bg)',bd:'var(--s-con-bd)',tx:'var(--s-con-tx)',bar:'var(--s-con-bar)'},
  {val:'flow',     lbl:'UI Flow',        bg:'var(--s-flo-bg)',bd:'var(--s-flo-bd)',tx:'var(--s-flo-tx)',bar:'var(--s-flo-bar)'},
  {val:'packaging',lbl:'UI Packaging',   bg:'var(--s-pkg-bg)',bd:'var(--s-pkg-bd)',tx:'var(--s-pkg-tx)',bar:'var(--s-pkg-bar)'},
  {val:'handoff',  lbl:'Handoff',        bg:'var(--s-han-bg)',bd:'var(--s-han-bd)',tx:'var(--s-han-tx)',bar:'var(--s-han-bar)'},
  {val:'update',   lbl:'Update',         bg:'var(--s-upd-bg)',bd:'var(--s-upd-bd)',tx:'var(--s-upd-tx)',bar:'var(--s-upd-bar)'},
  {val:'testgui',  lbl:'Test GUI',       bg:'var(--s-tst-bg)',bd:'var(--s-tst-bd)',tx:'var(--s-tst-tx)',bar:'var(--s-tst-bar)'},
  {val:'pending',  lbl:'Pending',        bg:'var(--s-pen-bg)',bd:'var(--s-pen-bd)',tx:'var(--s-pen-tx)',bar:'var(--s-pen-bar)'},
  {val:'completed',lbl:'Completed',      bg:'var(--s-don-bg)',bd:'var(--s-don-bd)',tx:'var(--s-don-tx)',bar:'var(--s-don-bar)'},
  {val:'cancel',   lbl:'Cancel',         bg:'var(--s-can-bg)',bd:'var(--s-can-bd)',tx:'var(--s-can-tx)',bar:'var(--s-can-bar)'},
];

const ALL_MEMBERS = [
  {name:'PhanVB',    role:'Manager'  },
  {name:'HoangCD',   role:'UI Leader'},
  {name:'DucNM135',  role:'Senior UX'},
  {name:'AnhBTP7',   role:'UXW'      },
  {name:'GiangNTT48',role:'Graphic'  },
  {name:'ChauPV',    role:'Senior'   },
  {name:'PhuongLT49',role:'Senior'   },
  {name:'MinhLT33',  role:'Mid'      },
  {name:'HuongDM6',  role:'Mid'      },
  {name:'HuongPT53', role:'Junior'   },
  {name:'HuongLT55', role:'Junior'   },
  {name:'NgaLT27',   role:'Junior'   },
];

const PIC_LIST = [
  {name:'HoangCD',   role:'UI Leader'},
  {name:'DucNM135',  role:'Senior UX'},
  {name:'GiangNTT48',role:'Graphic'  },
  {name:'AnhBTP7',   role:'UXW'      },
  {name:'ChauPV',    role:'Senior'   },
  {name:'PhuongLT49',role:'Senior'   },
];

const SC  = v => STATUSES.find(s=>s.val===v)||STATUSES[0];
const SL  = v => SC(v).lbl;
const e   = s => (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const gv  = id => { const el=document.getElementById(id); return el?el.value:''; };

// ══════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════
let projects   = [];
let _pid       = 0;
let _rt        = null;
let _saveTimer = null;
let selectedId = null;
let currentUser = null;
let fbListener  = null;

// ══════════════════════════════════════════════
// LOGIN
// ══════════════════════════════════════════════
(function initLogin() {
  const grid = document.getElementById('login-grid');
  const btn  = document.getElementById('login-btn');
  let picked = null;

  // Check session
  const saved = sessionStorage.getItem('pmo_user');
  if (saved) { currentUser = saved; afterLogin(); return; }

  grid.innerHTML = ALL_MEMBERS.map(m =>
    `<div class="login-chip" onclick="pickLogin(this,'${m.name}')">
      <span class="login-chip-name">${m.name}</span>
      <span class="login-chip-role">${m.role}</span>
    </div>`
  ).join('');

  window.pickLogin = (el, name) => {
    grid.querySelectorAll('.login-chip').forEach(c=>c.classList.remove('active'));
    el.classList.add('active');
    picked = name;
    btn.disabled = false;
  };

  window.doLogin = () => {
    if (!picked) return;
    currentUser = picked;
    sessionStorage.setItem('pmo_user', currentUser);
    afterLogin();
  };
})();

function afterLogin() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('m-reporter').value = currentUser;
  const bu = document.getElementById('brand-user');
  bu.textContent = currentUser + ' ↩';
  initWeek();
  loadFromFirebase();
}

function logoutUser() {
  sessionStorage.removeItem('pmo_user');
  location.reload();
}

// ══════════════════════════════════════════════
// WEEK
// ══════════════════════════════════════════════
function getISOWeek(d) {
  const t = new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
  t.setUTCDate(t.getUTCDate()+4-(t.getUTCDay()||7));
  const y = new Date(Date.UTC(t.getUTCFullYear(),0,1));
  return Math.ceil((((t-y)/86400000)+1)/7);
}

function initWeek() {
  document.getElementById('m-week').value = getISOWeek(new Date());
}

function onWeekChange() {
  schedRender();
  if (fbListener) { fbListener(); fbListener=null; }
  projects=[]; _pid=0; selectedId=null;
  renderSidebar(); renderForm();
  loadFromFirebase();
}

// ══════════════════════════════════════════════
// FIREBASE
// ══════════════════════════════════════════════
function weekKey() { return 'week_'+(gv('m-week')||getISOWeek(new Date())); }

function loadFromFirebase() {
  showSync('Đang tải...');
  const ref = db.ref('reports/'+weekKey());
  if (fbListener) fbListener();
  fbListener = ref.on('value', snap => {
    const data = snap.val();
    if (data && typeof data === 'object') {
      const remote = Object.entries(data)
        .map(([k,v])=>({...v, fbKey:k}))
        .sort((a,b)=>(a._order||0)-(b._order||0));
      projects=[]; _pid=0;
      remote.forEach(p=>{ const id=++_pid; projects.push({...p,id}); });
      selectedId = projects.length ? projects[0].id : null;
    } else {
      projects=[]; _pid=0; selectedId=null;
    }
    renderSidebar();
    renderForm();
    doRender();
    hideSync();
  }, err => { showSync('Lỗi: '+err.message, 3000); });
}

function saveToFirebase() {
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(()=>{
    showSync('Đang lưu...');
    const data = {};
    projects.forEach((p,i)=>{
      const key = p.fbKey || ('p'+p.id+'_'+Date.now());
      p.fbKey = key;
      data[key] = {
        name:     p.name     ||'',
        status:   p.status   ||'concept',
        phase:    p.phase    ||'1',
        pic:      p.pic      ||'',
        lastWeek: p.lastWeek ||'',
        nextWeek: p.nextWeek ||'',
        note:     p.note     ||'',
        progress: p.progress ||0,
        members:  p.members  ||[],
        updatedBy:currentUser||'',
        updatedAt:Date.now(),
        _order:   i,
      };
    });
    db.ref('reports/'+weekKey()).set(data)
      .then(()=>showSync('Đã lưu ✓',1500))
      .catch(err=>showSync('Lỗi lưu!',3000));
  }, 700);
}

function showSync(msg, autoHide) {
  const bar=document.getElementById('sync-bar');
  const lbl=document.getElementById('sync-label');
  bar.style.display='flex'; lbl.textContent=msg;
  if (autoHide) setTimeout(hideSync, autoHide);
}
function hideSync(){ document.getElementById('sync-bar').style.display='none'; }

// ══════════════════════════════════════════════
// TAB
// ══════════════════════════════════════════════
function switchTab(t) {
  ['input','report'].forEach(k=>{
    document.getElementById('t-'+k).classList.toggle('active',k===t);
    document.getElementById('panel-'+k).classList.toggle('active',k===t);
  });
  if (t==='report') doRender();
}

// ══════════════════════════════════════════════
// SYNC FROM DOM
// ══════════════════════════════════════════════
function syncP(p) {
  if (!p) return;
  const g = id => { const el=document.getElementById(id); return el?el.value:null; };
  const n=g('pn-'+p.id);  if(n!==null) p.name=n;
  const s=g('ps-'+p.id);  if(s!==null) p.status=s;
  const ph=g('pph-'+p.id);if(ph!==null) p.phase=ph;
  const lw=g('pl-'+p.id); if(lw!==null) p.lastWeek=lw;
  const nw=g('pnx-'+p.id);if(nw!==null) p.nextWeek=nw;
  const no=g('pno-'+p.id);if(no!==null) p.note=no;
  const ms=document.querySelector(`.ms-btn.active[data-pid="${p.id}"]`);
  if(ms) p.progress=parseInt(ms.dataset.val);
  document.querySelectorAll(`.member-pct[data-pid="${p.id}"]`).forEach(el=>{
    const m=p.members.find(x=>x.name===el.dataset.member);
    if(m) m.pct=el.value;
  });
}
function syncSelected(){ const p=projects.find(x=>x.id===selectedId); if(p) syncP(p); }
function syncAll(){ projects.forEach(p=>syncP(p)); }

// ══════════════════════════════════════════════
// PROJECT CRUD
// ══════════════════════════════════════════════
function addProject(preset) {
  syncSelected();
  const id=++_pid;
  const p={id,name:'',status:'concept',phase:'1',pic:'',lastWeek:'',nextWeek:'',note:'',progress:0,members:[],...(preset||{})};
  projects.push(p);
  selectedId=id;
  renderSidebar(); renderForm(); schedRender(); saveToFirebase();
}

function removeProject(id) {
  syncSelected();
  projects=projects.filter(p=>p.id!==id);
  if(selectedId===id) selectedId=projects.length?projects[projects.length-1].id:null;
  renderSidebar(); renderForm(); schedRender(); saveToFirebase();
}

function selectProject(id) {
  syncSelected();
  selectedId=id;
  renderSidebar(); renderForm();
}

// ══════════════════════════════════════════════
// MILESTONE / PHASE / PIC / MEMBERS
// ══════════════════════════════════════════════
function setMilestone(pid, val) {
  document.querySelectorAll(`.ms-btn[data-pid="${pid}"]`).forEach(b=>b.classList.toggle('active',parseInt(b.dataset.val)===val));
  const p=projects.find(x=>x.id===pid);
  if(p){p.progress=val; updateSidebarItem(p); schedRender(); saveToFirebase();}
}

function setPhase(pid, val) {
  document.querySelectorAll(`.phase-btn[data-pid="${pid}"]`).forEach(b=>b.classList.toggle('active',parseInt(b.dataset.val)===val));
  const h=document.getElementById('pph-'+pid); if(h) h.value=val;
  const p=projects.find(x=>x.id===pid);
  if(p){p.phase=String(val); updateSidebarItem(p); schedRender(); saveToFirebase();}
}

function setPIC(pid, name) {
  const p=projects.find(x=>x.id===pid); if(!p) return;
  p.pic=(p.pic===name)?'':name;
  const area=document.getElementById('pic-area-'+pid);
  if(area) area.innerHTML=buildPicHTML(p);
  updateSidebarItem(p); schedRender(); saveToFirebase();
}

function toggleMember(pid, name) {
  const p=projects.find(x=>x.id===pid); if(!p) return;
  document.querySelectorAll(`.member-pct[data-pid="${pid}"]`).forEach(el=>{
    const m=p.members.find(x=>x.name===el.dataset.member); if(m) m.pct=el.value;
  });
  const idx=p.members.findIndex(m=>m.name===name);
  if(idx>-1) p.members.splice(idx,1); else p.members.push({name,pct:''});
  const area=document.getElementById('member-area-'+pid);
  if(area){area.innerHTML=buildMemberHTML(p); bindPctListeners(p);}
  schedRender(); saveToFirebase();
}

// ══════════════════════════════════════════════
// BUILD HTML HELPERS
// ══════════════════════════════════════════════
function buildPicHTML(p){
  return PIC_LIST.map(tm=>{
    const sel=p.pic===tm.name;
    return `<button type="button" class="member-chip${sel?' selected':''}" onclick="setPIC(${p.id},'${tm.name}')">
      ${e(tm.name)}<span class="chip-role"> · ${e(tm.role)}</span>
    </button>`;
  }).join('');
}

function buildMemberHTML(p){
  const chips=ALL_MEMBERS.map(tm=>{
    const sel=p.members.some(m=>m.name===tm.name);
    return `<button type="button" class="member-chip${sel?' selected':''}" onclick="toggleMember(${p.id},'${tm.name}')">
      ${e(tm.name)}<span class="chip-role"> · ${e(tm.role)}</span>
    </button>`;
  }).join('');
  const effort=p.members.length?`<div class="effort-list">${p.members.map(m=>`
    <div class="effort-row">
      <span class="effort-name">${e(m.name)}</span>
      <div class="effort-input-wrap">
        <input type="number" min="0" max="100" class="member-pct" data-pid="${p.id}" data-member="${e(m.name)}" value="${e(m.pct)}" placeholder="0">
        <span class="effort-unit">%</span>
      </div>
    </div>`).join('')}</div>`
    :`<div style="font-size:12px;color:var(--text-3);padding-top:4px">Chọn thành viên ở trên để nhập effort.</div>`;
  return `<div class="member-chips">${chips}</div>${effort}`;
}

function bindPctListeners(p){
  document.querySelectorAll(`.member-pct[data-pid="${p.id}"]`).forEach(el=>{
    const mn=el.dataset.member;
    el.addEventListener('input',()=>{
      const m=p.members.find(x=>x.name===mn); if(m){m.pct=el.value; schedRender(); saveToFirebase();}
    });
  });
}

// ══════════════════════════════════════════════
// SIDEBAR
// ══════════════════════════════════════════════
function renderSidebar(){
  const list=document.getElementById('sidebar-list');
  if(!projects.length){list.innerHTML='<div class="sidebar-empty-hint">Chưa có dự án.<br>Bấm "Thêm dự án" để bắt đầu.</div>';return;}
  list.innerHTML=projects.map(p=>{
    const c=SC(p.status);
    return `<div class="sidebar-item${p.id===selectedId?' active':''}" onclick="selectProject(${p.id})" id="sbi-${p.id}">
      <span class="sidebar-dot" style="background:${c.bar}"></span>
      <div class="sidebar-item-body">
        <div class="sidebar-item-name${p.name?'':' empty'}">${p.name?e(p.name):'Chưa đặt tên'}</div>
        <div class="sidebar-item-meta">${p.phase?'Phase '+p.phase+' · ':''}${c.lbl}${p.pic?' · '+p.pic:''}</div>
      </div>
      <button class="sidebar-item-del" onclick="event.stopPropagation();removeProject(${p.id})">×</button>
    </div>`;
  }).join('');
  const a=list.querySelector('.sidebar-item.active'); if(a) a.scrollIntoView({block:'nearest'});
}

function updateSidebarItem(p){
  const el=document.getElementById('sbi-'+p.id); if(!el) return;
  const c=SC(p.status);
  el.querySelector('.sidebar-dot').style.background=c.bar;
  const n=el.querySelector('.sidebar-item-name');
  n.textContent=p.name||'Chưa đặt tên'; n.className='sidebar-item-name'+(p.name?'':' empty');
  el.querySelector('.sidebar-item-meta').textContent=(p.phase?'Phase '+p.phase+' · ':'')+c.lbl+(p.pic?' · '+p.pic:'');
}

// ══════════════════════════════════════════════
// FORM
// ══════════════════════════════════════════════
function renderForm(){
  const emptyEl=document.getElementById('pane-empty');
  const form=document.getElementById('pane-form');
  const p=projects.find(x=>x.id===selectedId);
  if(!p){emptyEl.style.display='';form.style.display='none';return;}
  emptyEl.style.display='none'; form.style.display='';

  const msHTML=MILESTONES.map(v=>`<button class="ms-btn${p.progress===v?' active':''}" data-pid="${p.id}" data-val="${v}" onclick="setMilestone(${p.id},${v})">${v}%</button>`).join('');
  const phHTML=PHASES.map(v=>`<button class="phase-btn${String(p.phase)===String(v)?' active':''}" data-pid="${p.id}" data-val="${v}" onclick="setPhase(${p.id},${v})">Phase ${v}</button>`).join('');

  form.innerHTML=`
<div class="form-section">
  <div style="margin-bottom:4px">
    <input id="pn-${p.id}" type="text" value="${e(p.name)}" placeholder="Tên dự án..."
      style="font-size:18px;font-weight:700;border:none;border-bottom:2px solid var(--border-md);outline:none;background:transparent;color:var(--text-1);width:100%;font-family:var(--font);padding-bottom:6px">
  </div>

  <div class="form-card">
    <div class="form-card-title">Thông tin chung</div>
    <div class="form-row">
      <div class="field">
        <label>Trạng thái</label>
        <select class="status-sel" id="ps-${p.id}">
          ${STATUSES.map(s=>`<option value="${s.val}"${p.status===s.val?' selected':''}>${s.lbl}</option>`).join('')}
        </select>
      </div>
    </div>
    <div class="field">
      <label>PIC</label>
      <div class="member-chips" id="pic-area-${p.id}" style="margin-bottom:0">${buildPicHTML(p)}</div>
    </div>
  </div>

  <div class="form-card">
    <div class="form-card-title">Phase dự án</div>
    <div class="phase-group">${phHTML}</div>
    <input type="hidden" id="pph-${p.id}" value="${e(p.phase||'1')}">
  </div>

  <div class="form-card">
    <div class="form-card-title">Tiến độ</div>
    <div class="milestones">${msHTML}</div>
  </div>

  <div class="form-card">
    <div class="form-card-title">Nội dung tuần</div>
    <div class="form-row">
      <div class="field">
        <label>Tuần trước đã làm</label>
        <textarea id="pl-${p.id}" rows="3" placeholder="Mô tả công việc tuần trước...">${e(p.lastWeek)}</textarea>
      </div>
      <div class="field">
        <label>Kế hoạch tuần tới</label>
        <textarea id="pnx-${p.id}" rows="3" placeholder="Dự kiến tuần sau...">${e(p.nextWeek)}</textarea>
      </div>
    </div>
    <div class="field">
      <label>Ghi chú / Risk / Issue</label>
      <textarea id="pno-${p.id}" rows="2" placeholder="Ghi chú, risk, issue...">${e(p.note)}</textarea>
    </div>
  </div>

  <div class="form-card">
    <div class="form-card-title">Nguồn lực</div>
    <div id="member-area-${p.id}">${buildMemberHTML(p)}</div>
  </div>
</div>
<div class="form-bottom-pad"></div>`;

  // Bind listeners directly to data — no syncP needed
  const bind=(id,key)=>{
    const el=document.getElementById(id); if(!el) return;
    el.addEventListener('input',()=>{p[key]=el.value; updateSidebarItem(p); schedRender(); saveToFirebase();});
  };
  bind('pn-'+p.id,'name');
  bind('pl-'+p.id,'lastWeek');
  bind('pnx-'+p.id,'nextWeek');
  bind('pno-'+p.id,'note');
  const sel=document.getElementById('ps-'+p.id);
  if(sel) sel.addEventListener('change',()=>{p.status=sel.value; updateSidebarItem(p); schedRender(); saveToFirebase();});
  bindPctListeners(p);
}

// ══════════════════════════════════════════════
// REPORT RENDER
// ══════════════════════════════════════════════
function schedRender(){clearTimeout(_rt);_rt=setTimeout(doRender,120);}

function doRender(){
  const week=gv('m-week')||'—';
  const rep=gv('m-reporter')||'ChauPV';
  const team=gv('m-team')||'UIUX PMO';

  const isPend   =p=>p.status==='pending';
  const isDone   =p=>p.status==='completed';
  const isCancel =p=>p.status==='cancel';
  const pend     =projects.filter(isPend);
  const done     =projects.filter(isDone);
  const cardProjs=projects.filter(p=>!isPend(p)&&!isDone(p));
  const total    =projects.length;

  const emptyEl=document.getElementById('rpt-empty');
  const body   =document.getElementById('rpt-body');
  if(!total){emptyEl.style.display='';body.style.display='none';return;}
  emptyEl.style.display='none'; body.style.display='';

  const now=new Date();
  const ds=now.toLocaleDateString('vi-VN',{day:'2-digit',month:'2-digit',year:'numeric'});

  // Scorecards
  const counts={};
  projects.forEach(p=>{const l=SL(p.status);counts[l]=(counts[l]||0)+1;});
  const scoreHTML=[`<div class="mc"><div class="mc-lbl">Tổng dự án</div><div class="mc-val">${total}</div><div class="mc-sub">theo dõi</div></div>`]
    .concat(STATUSES.filter(s=>(counts[s.lbl]||0)>0).map(s=>`<div class="mc"><div class="mc-lbl">${s.lbl}</div><div class="mc-val" style="color:${s.tx}">${counts[s.lbl]}</div><div class="mc-sub">dự án</div></div>`))
    .join('');

  // Chart
  const chartRows=projects.filter(p=>!isCancel(p))
    .slice().sort((a,b)=>(b.progress||0)-(a.progress||0))
    .map(p=>{
      const c=SC(p.status); const pct=Math.max(0,Math.min(100,p.progress||0));
      const na=isPend(p)&&pct===0;
      return `<div class="cbar-row">
        <div class="cbar-name" title="${e(p.name)}">${e(p.name)||'<em>Chưa đặt tên</em>'}</div>
        <div class="cbar-track"><div class="cbar-fill" style="width:${pct}%;background:${c.bar}"></div></div>
        <div class="cbar-pct"${na?' style="color:var(--text-3)"':''}>${na?'—':pct+'%'}</div>
      </div>`;
    }).join('');

  const usedStats=[...new Set(projects.map(p=>p.status))];
  const legend=usedStats.map(v=>{const c=SC(v);return `<div class="leg-item"><span class="leg-dot" style="background:${c.bar}"></span>${c.lbl}</div>`;}).join('');

  // Member pills
  const pills=p=>{
    if(!p.members||!p.members.length) return '';
    return '<div class="member-pills">'+p.members.map(m=>`<span class="member-pill"><svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="5" cy="3.5" r="1.8"/><path d="M1.5 8.5c0-1.93 1.57-3.5 3.5-3.5s3.5 1.57 3.5 3.5"/></svg>${e(m.name)}${m.pct?` <span class="member-pill-pct">${e(m.pct)}%</span>`:''}</span>`).join('')+'</div>';
  };

  // Milestone dots
  const dots=p=>{const c=SC(p.status);return MILESTONES.map(v=>`<span class="ms-dot${(p.progress||0)>=v?' hit':''}" style="${(p.progress||0)>=v?'--dot-color:'+c.bar:''}"></span>`).join('');};

  // Cards
  const cards=cardProjs.map(p=>{
    const c=SC(p.status); const pct=Math.max(0,Math.min(100,p.progress||0));
    const hasNote=p.note&&p.note.trim(); const hasMem=p.members&&p.members.length>0;
    return `<div class="rpt-card${hasNote?' risky':''}">
      <div class="rpt-card-top">
        <div class="rpt-card-name">${e(p.name)||'<em style="color:var(--text-3);font-weight:400">Chưa đặt tên</em>'}</div>
        <span class="spill" style="background:${c.bg};border:1px solid ${c.bd};color:${c.tx}">${SL(p.status)}</span>
      </div>
      ${p.pic?`<div style="font-size:11px;color:var(--text-2);display:flex;align-items:center;gap:4px"><svg width="11" height="11" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="5" cy="3.5" r="1.8"/><path d="M1.5 8.5c0-1.93 1.57-3.5 3.5-3.5s3.5 1.57 3.5 3.5"/></svg><span style="font-weight:600">PIC:</span> ${e(p.pic)}</div>`:''}
      <div>
        <div class="pmini-meta"><span>Tiến độ</span><span>${pct}%</span></div>
        <div class="pmini-track"><div class="pmini-fill" style="width:${pct}%;background:${c.bar}"></div></div>
        <div class="pmini-dots">${dots(p)}</div>
      </div>
      <hr class="cdiv">
      ${p.lastWeek?`<div class="crow"><span class="crow-ic">↩</span><div><div class="crow-lbl">Tuần trước</div><div class="crow-txt">${e(p.lastWeek)}</div></div></div>`:''}
      ${p.nextWeek?`<div class="crow"><span class="crow-ic">📅</span><div><div class="crow-lbl">Kế hoạch tuần tới</div><div class="crow-txt">${e(p.nextWeek)}</div></div></div>`:''}
      ${hasNote?`<div class="note-box"><div class="note-box-lbl">Ghi chú / Risk</div>${e(p.note)}</div>`:''}
      ${hasMem?`<div class="card-resource"><div class="crow-lbl" style="margin-bottom:5px">Nguồn lực</div>${pills(p)}</div>`:''}
    </div>`;
  }).join('');

  const pendRows=pend.map(p=>`<div class="pend-row"><div class="pend-name">${e(p.name)||'Chưa đặt tên'}</div><div class="pend-note">${e(p.note||p.lastWeek||'Không có cập nhật mới')}</div></div>`).join('');
  const doneRows=done.map(p=>`<div class="done-row"><div class="pend-name">${e(p.name)||'Chưa đặt tên'}</div><div class="pend-note">${e(p.lastWeek||p.note||'Đã hoàn thành')}</div></div>`).join('');

  body.innerHTML=`
<div class="rpt-header">
  <div>
    <div class="rpt-kicker">FIS · ${e(team)}</div>
    <div class="rpt-title">Báo cáo tiến độ dự án</div>
    <div class="rpt-sub">Tổng hợp trạng thái & kế hoạch tuần tới</div>
  </div>
  <div class="rpt-right">
    <div class="rpt-week">Tuần ${e(week)} · ${now.getFullYear()}</div>
    <div class="rpt-by">Người lập: ${e(rep)}</div>
    <div class="rpt-by" style="margin-top:2px">${ds}</div>
  </div>
</div>
<div class="metrics">${scoreHTML}</div>
<div class="sec-head">Tiến độ theo dự án</div>
<div class="chart-block">
  ${chartRows||'<div class="empty-msg" style="padding:.75rem">Chưa có dữ liệu</div>'}
  <div class="chart-legend">${legend}</div>
</div>
${cardProjs.length?`<div class="sec-head">Chi tiết dự án</div><div class="proj-grid">${cards}</div>`:''}
${pend.length?`<div class="sec-head">Pending / Chờ phản hồi</div><div class="pend-list">${pendRows}</div>`:''}
${done.length?`<div class="sec-head">Completed / Hoàn thành</div><div class="pend-list">${doneRows}</div>`:''}
<div class="rpt-footer">
  <span>Báo cáo tuần ${e(week)} · FIS · ${e(team)}</span>
  <span class="rpt-footer-r">Người lập: ${e(rep)}</span>
</div>`;
}

// ══════════════════════════════════════════════
// EXPORT PNG
// ══════════════════════════════════════════════
function doExport(){
  if(!document.getElementById('panel-report').classList.contains('active')){
    switchTab('report'); setTimeout(_runExport,350);
  } else _runExport();
}
function _runExport(){
  const btn=document.getElementById('exp-btn');
  btn.disabled=true; btn.textContent='Đang xuất...';
  document.getElementById('topnav').style.display='none';
  document.getElementById('sync-bar').style.display='none';
  html2canvas(document.getElementById('rpt-printable'),{scale:2,useCORS:true,backgroundColor:'#ffffff',logging:false})
  .then(canvas=>{
    const a=document.createElement('a');
    a.download='bao-cao-tuan-'+(gv('m-week')||'xx')+'.png';
    a.href=canvas.toDataURL('image/png'); a.click();
    document.getElementById('topnav').style.display='';
    btn.disabled=false;
    btn.innerHTML='<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:13px;height:13px"><path d="M8 2v8M5 7l3 3 3-3M2 12v1a1 1 0 001 1h10a1 1 0 001-1v-1"/></svg> Xuất PNG';
  }).catch(()=>{
    document.getElementById('topnav').style.display='';
    btn.disabled=false; btn.textContent='Xuất PNG';
    alert('Lỗi xuất PNG.');
  });
}
</script>
</body>
